<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PGDOST — Owner Password Reset</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/theme-dark.css" />
<link rel="stylesheet" href="../css/cinematic.css" />


  <style>
    body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .reset-wrap { width: 100%; max-width: 520px; }
    .password-wrap { position: relative; }
    .password-toggle {
      position: absolute; right: 0.65rem; top: 50%; transform: translateY(-50%);
      font-size: 0.78rem; font-weight: 700; color: var(--clr-text-muted);
      background: transparent; border: 0; cursor: pointer;
    }
    .hidden { display: none !important; }
  </style>
</head>
<body class="bg-gradient-mesh light-mode">
  <div class="reset-wrap">
    <a href="owner-login.html" class="back-to-home">‹ Back to Owner Login</a>
    <div class="card animate-scale-in">
      <h1 class="auth-title text-center">Reset Owner Password</h1>
      <p class="auth-subtitle text-center">Receive OTP and set a new password securely.</p>

      <form id="request-form" class="flex flex-col gap-md">
        <div class="form-group">
          <label class="form-label" for="identifier">Email or Phone Number</label>
          <input id="identifier" type="text" class="form-input" placeholder="owner@domain.com or +91..." required />
        </div>
        <p id="request-error" class="form-error hidden"></p>
        <button id="request-btn" type="submit" class="btn btn-primary btn-lg w-full">Send OTP</button>
      </form>

      <form id="reset-form" class="flex flex-col gap-md hidden" style="margin-top:1rem;">
        <div class="form-group">
          <label class="form-label" for="otp">Enter OTP</label>
          <input id="otp" type="text" inputmode="numeric" maxlength="6" class="form-input" placeholder="6-digit OTP" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="new-password">New Password</label>
          <div class="password-wrap">
            <input id="new-password" type="password" class="form-input" placeholder="Min 8 characters" required />
            <button type="button" class="password-toggle" data-target="new-password">Show</button>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="confirm-new-password">Confirm New Password</label>
          <div class="password-wrap">
            <input id="confirm-new-password" type="password" class="form-input" placeholder="Repeat password" required />
            <button type="button" class="password-toggle" data-target="confirm-new-password">Show</button>
          </div>
        </div>
        <p id="reset-error" class="form-error hidden"></p>
        <p id="reset-success" class="text-success text-sm hidden"></p>
        <button id="reset-btn" type="submit" class="btn btn-success btn-lg w-full">Reset Password</button>
      </form>
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="../scripts/api.js"></script>
<script src="../scripts/cinematic.js"></script>

  <script>
    let activeIdentifier = '';
    document.querySelectorAll('.password-toggle').forEach((button) => {
      button.addEventListener('click', () => {
        const input = document.getElementById(button.dataset.target);
        const show = input.type === 'password';
        input.type = show ? 'text' : 'password';
        button.textContent = show ? 'Hide' : 'Show';
      });
    });

    document.getElementById('request-form').addEventListener('submit', async (event) => {
      event.preventDefault();
      const identifier = document.getElementById('identifier').value.trim();
      const btn = document.getElementById('request-btn');
      const err = document.getElementById('request-error');
      err.classList.add('hidden');
      if (!identifier) {
        err.textContent = 'Enter your registered identifier.';
        err.classList.remove('hidden');
        return;
      }
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner" style="width:16px;height:16px;border-width:2px;"></span> Sending OTP...';
      try {
        const response = await api.post('/auth/owner/password/forgot/request/', { identifier });
        activeIdentifier = identifier;
        document.getElementById('reset-form').classList.remove('hidden');
        Toast.success('OTP sent. Check your inbox.');
        if (response.otp_code) {
          err.classList.remove('hidden');
          err.style.color = '#047857';
          err.style.background = 'rgba(16,185,129,0.1)';
          err.style.border = '1px solid rgba(16,185,129,0.3)';
          err.textContent = `📋 Development OTP: ${response.otp_code}`;
        }
      } catch (error) {
        err.textContent = error.message || 'Failed to send OTP.';
        err.classList.remove('hidden');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Send OTP';
      }
    });

    document.getElementById('reset-form').addEventListener('submit', async (event) => {
      event.preventDefault();
      const btn = document.getElementById('reset-btn');
      const err = document.getElementById('reset-error');
      const success = document.getElementById('reset-success');
      err.classList.add('hidden');
      success.classList.add('hidden');

      const otp = document.getElementById('otp').value.trim();
      const newPassword = document.getElementById('new-password').value;
      const confirmNewPassword = document.getElementById('confirm-new-password').value;
      if (!activeIdentifier) {
        err.textContent = 'Request OTP first.';
        err.classList.remove('hidden');
        return;
      }
      if (otp.length !== 6) {
        err.textContent = 'OTP must be 6 digits.';
        err.classList.remove('hidden');
        return;
      }
      if (newPassword !== confirmNewPassword) {
        err.textContent = 'Passwords do not match.';
        err.classList.remove('hidden');
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner" style="width:16px;height:16px;border-width:2px;"></span> Resetting...';
      try {
        await api.post('/auth/owner/password/forgot/confirm/', {
          identifier: activeIdentifier,
          otp,
          new_password: newPassword,
          confirm_new_password: confirmNewPassword,
        });
        success.textContent = 'Password reset successful. Redirecting to login...';
        success.classList.remove('hidden');
        Toast.success('Password reset complete.');
        setTimeout(() => { window.location.href = 'owner-login.html'; }, 1200);
      } catch (error) {
        err.textContent = error.message || 'Unable to reset password.';
        err.classList.remove('hidden');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Reset Password';
      }
    });
  </script>
</body>
</html>
