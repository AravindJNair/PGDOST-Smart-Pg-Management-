<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Invoice - PGDOST</title>
    <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/theme-dark.css" />
<link rel="stylesheet" href="../css/cinematic.css" />


    <script>
      (function () {
        try {
          var t = localStorage.getItem('pgdost-theme') === 'dark' ? 'dark' : 'light';
          document.documentElement.classList.add(t + '-mode');
        } catch (e) {
          document.documentElement.classList.add('light-mode');
        }
      })();
    </script>
    <style>
        body { font-family: 'Poppins', 'Inter', sans-serif; margin: 0; padding: 32px 16px; background: var(--clr-bg, #f4f4f5); color: var(--clr-text, #333); }
        .invoice-container { max-width: 860px; margin: 0 auto; background: var(--glass-bg-strong, #fff); padding: 36px; box-shadow: var(--shadow-md, 0 8px 24px rgba(0,0,0,0.08)); border-radius: 20px; border: 1px solid var(--glass-border, rgba(0,0,0,0.08)); backdrop-filter: blur(16px); }
        .header { display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 1px solid var(--clr-border, #e5e7eb); padding-bottom: 20px; margin-bottom: 30px; }
        .logo { font-size: 24px; font-weight: 800; color: var(--clr-brand-500, #16a34a); margin: 0; }
        .invoice-title { font-size: 32px; font-weight: 700; color: var(--clr-text-muted, #6b7280); margin: 0; text-transform: uppercase; letter-spacing: 1px; }
        .details-row { display: flex; justify-content: space-between; margin-bottom: 40px; }
        .details-col { flex: 1; }
        .details-col h3 { font-size: 14px; color: var(--clr-text-muted, #6b7280); text-transform: uppercase; margin-bottom: 5px; }
        .details-col p { margin: 0 0 5px 0; font-size: 16px; font-weight: 500; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 30px; }
        th { background: var(--clr-bg-3, #f9fafb); padding: 12px 15px; text-align: left; font-size: 14px; color: var(--clr-text-muted, #6b7280); text-transform: uppercase; border-bottom: 1px solid var(--clr-border, #e5e7eb); }
        td { padding: 15px; border-bottom: 1px solid var(--clr-border, #e5e7eb); font-size: 16px; }
        .text-right { text-align: right; }
        .total-row { display: flex; justify-content: flex-end; align-items: center; font-size: 20px; font-weight: 700; }
        .total-label { margin-right: 20px; color: var(--clr-text-muted, #6b7280); }
        .total-amount { color: var(--clr-brand-500, #16a34a); font-size: 24px; }
        .badge { display: inline-block; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; text-transform: uppercase; }
        .badge-paid { background: rgba(67,160,106,0.18); color: #2f7c4f; }
        .badge-unpaid { background: rgba(224,86,86,0.18); color: #c73333; }
        .footer { text-align: center; margin-top: 50px; font-size: 14px; color: var(--clr-text-muted, #9ca3af); border-top: 1px solid var(--clr-border, #e5e7eb); padding-top: 20px; }
        .no-print { display: flex; justify-content: flex-end; margin-bottom: 20px; gap: 10px; }
        .btn { background: var(--clr-brand-600, #16a34a); color: white; border: 1px solid transparent; padding: 10px 20px; border-radius: 999px; cursor: pointer; font-size: 14px; font-weight: 700; text-decoration: none; display: inline-block; transition: transform .2s ease, box-shadow .2s ease; }
        .btn:hover { transform: translateY(-1px); box-shadow: var(--shadow-brand, 0 10px 20px rgba(0,0,0,.12)); }
        .btn-outline { background: var(--glass-bg-strong, white); color: var(--clr-text, #374151); border: 1px solid var(--clr-border, #d1d5db); }
        body.dark-mode .invoice-container { background: rgba(10, 24, 17, 0.82); border-color: rgba(143, 234, 91, 0.24); box-shadow: 0 0 42px rgba(143, 234, 91, 0.14); }
        body.dark-mode th { background: rgba(255,255,255,0.06); }
        body.dark-mode .badge-paid { background: rgba(143, 234, 91, 0.18); color: #c6ffa6; }
        body.dark-mode .badge-unpaid { background: rgba(255, 120, 120, 0.2); color: #ffd3d3; }
        body.dark-mode .btn { background: linear-gradient(135deg, #8fea5b, #326d23); color: #08130a; border-color: rgba(143, 234, 91, 0.35); }
        @media print {
            body { background: white; margin: 0; }
            .invoice-container { box-shadow: none; margin: 0; padding: 20px; max-width: 100%; }
            .no-print { display: none; }
        }
    </style>
</head>
<body class="light-mode">
    <div class="invoice-container">
        <div class="no-print">
            <button class="btn btn-outline" onclick="window.history.back()">Back</button>
            <button class="btn" onclick="window.print()">Print / PDF</button>
        </div>
        
        <div class="header">
            <div>
                <h1 class="logo">PGDOST</h1>
                <p style="color: #6b7280; margin: 5px 0 0 0; font-size: 14px;">Smart PG Management</p>
            </div>
            <div style="text-align: right;">
                <h2 class="invoice-title">Invoice</h2>
                <p style="margin: 5px 0 0 0; font-weight: 600;" id="inv-date">Date: </p>
            </div>
        </div>

        <div class="details-row">
            <div class="details-col">
                <h3>Billed To</h3>
                <p id="inv-resident-name">Loading...</p>
                <p id="inv-property-name" style="color: #6b7280; font-weight: normal; font-size: 14px;"></p>
            </div>
            <div class="details-col" style="text-align: right;">
                <h3>Invoice Details</h3>
                <p>Status: <span id="inv-status" class="badge">Loading...</span></p>
                <p style="font-size: 14px; color: #6b7280; font-weight: normal;">Due Date: <span id="inv-due-date"></span></p>
                <p style="font-size: 14px; color: #6b7280; font-weight: normal; display:none;" id="inv-paid-row">Paid On: <span id="inv-paid-date"></span></p>
            </div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Description</th>
                    <th class="text-right">Amount</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>
                        <strong id="inv-desc-title">Rent</strong><br>
                        <span style="font-size: 14px; color: #6b7280;" id="inv-notes"></span>
                    </td>
                    <td class="text-right" style="font-weight: 600;" id="inv-amount">₹0.00</td>
                </tr>
            </tbody>
        </table>

        <div class="total-row">
            <span class="total-label">Total Amount:</span>
            <span class="total-amount" id="inv-total">₹0.00</span>
        </div>

        <div class="footer">
            <p>Thank you for using PGDOST!</p>
            <p>If you have any questions concerning this invoice, please contact the property owner.</p>
        </div>
    </div>

    <script src="../scripts/api.js"></script>
<script src="../scripts/cinematic.js"></script>

    <script>
        async function loadInvoice() {
            const urlParams = new URLSearchParams(window.location.search);
            const invoiceId = urlParams.get('id');
            const role = urlParams.get('role'); // 'resident' or 'owner'
            
            if (!invoiceId) {
                alert('No invoice ID provided.');
                return;
            }
            if (!Auth.isLoggedIn()) {
                window.location.href = 'login.html';
                return;
            }

            try {
                // Determine endpoint based on role (owners and residents have different list endpoints, but details are same if implemented, otherwise we fetch list and filter)
                let invoices = [];
                if (role === 'owner') {
                    invoices = await api.get('/payments/owner/');
                } else {
                    invoices = await api.get('/payments/my/');
                }
                
                const invoice = invoices.find(i => i.id == invoiceId);
                
                if (!invoice) {
                    alert('Invoice not found or access denied.');
                    return;
                }

                document.getElementById('inv-date').textContent = `Date: ${new Date(invoice.created_at).toLocaleDateString()}`;
                document.getElementById('inv-resident-name').textContent = invoice.resident_username;
                document.getElementById('inv-property-name').textContent = invoice.property_name;
                
                const statusBadge = document.getElementById('inv-status');
                statusBadge.textContent = invoice.status_display;
                if (invoice.status === 'paid') {
                    statusBadge.className = 'badge badge-paid';
                    document.getElementById('inv-paid-row').style.display = 'block';
                    document.getElementById('inv-paid-date').textContent = invoice.payment_date ? new Date(invoice.payment_date).toLocaleDateString() : 'N/A';
                } else {
                    statusBadge.className = 'badge badge-unpaid';
                }
                
                document.getElementById('inv-due-date').textContent = new Date(invoice.due_date).toLocaleDateString();
                document.getElementById('inv-desc-title').textContent = `Rent for ${invoice.month_display} ${invoice.year}`;
                document.getElementById('inv-notes').textContent = invoice.notes || '';
                
                const amtFormatted = `₹${parseFloat(invoice.amount).toFixed(2)}`;
                document.getElementById('inv-amount').textContent = amtFormatted;
                document.getElementById('inv-total').textContent = amtFormatted;

            } catch (err) {
                alert('Failed to load invoice details.');
            }
        }
        
        loadInvoice();
    </script>
</body>
</html>
